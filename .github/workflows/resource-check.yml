name: resource-check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-resource-index:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check resource structure
        shell: pwsh
        run: ./scripts/check_resources.ps1

      - name: Check public links
        shell: pwsh
        run: ./scripts/check_public_links.ps1

      - name: Build and validate release bundle
        shell: pwsh
        run: ./scripts/build_release_bundle.ps1 -SkipPublicLinkCheck

      - name: Upload link-check report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: public-link-check
          path: |
            resources/link_check_latest.csv
            resources/link_check_latest.md

      - name: Upload validated release bundle
        uses: actions/upload-artifact@v4
        with:
          name: companion-release-bundle
          path: |
            dist/awesome-wireless-coverage-intelligence-release.zip
            dist/release_bundle_validation_latest.md
            dist/release_bundle_validation_latest.json
